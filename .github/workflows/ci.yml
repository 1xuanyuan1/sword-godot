name: Godot checks

on:
  push:
  pull_request:

jobs:
  synthetic-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
      - name: Parse project
        run: godot --headless --editor --path . --quit
      - name: Check Chinese documentation and GDScript API comments
        run: python3 tools/check_documentation.py
      - name: Run synthetic format tests
        run: godot --headless --path . --script res://tests/run_tests.gd
      - name: Run synthetic classic battle tests
        run: godot --headless --path . --script res://tests/run_battle_logic_tests.gd
      - name: Run synthetic scripted battle bridge tests
        run: godot --headless --path . --script res://tests/run_battle_bridge_tests.gd
